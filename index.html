<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방산 리서치 아카이브</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #161b22;
      --surface-raised: #1c2129;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #9da7b3;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --accent-light: #1a2a3d;
      --tavily: #58a6ff;
      --tavily-light: #152238;
      --naver: #3fb950;
      --naver-light: #132519;
      --report-accent: #a371f7;
      --report-light: #1f1633;
      --success: #3fb950;
      --success-bg: #12261a;
      --success-border: #238636;
      --error: #f85149;
      --error-bg: #2d1214;
      --error-border: #6e2a2a;
      --warn-bg: #2a2410;
      --warn-text: #e3b341;
      --warn-border: #4d3d14;
      --highlight: #1a2f4a;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
      --radius: 8px;
    }

    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    header > p {
      margin-top: 0.5rem;
      font-size: 0.9375rem;
      color: var(--text-secondary);
    }

    .research-form {
      display: flex;
      gap: 0.625rem;
      margin-top: 1.25rem;
    }

    .research-form input {
      flex: 1;
      min-width: 0;
      padding: 0.625rem 0.875rem;
      font-size: 0.9375rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-primary);
    }

    .research-form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
    }

    .research-form button {
      flex-shrink: 0;
      padding: 0.625rem 1.125rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      color: #0d1117;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }

    .research-form button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .research-form button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .research-status {
      margin-top: 0.625rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .research-status--error {
      color: var(--error);
    }

    .research-status--ok {
      color: var(--success);
    }

    .kakao-banner {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      border: 1px solid var(--warn-border);
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .kakao-banner--ok {
      background: var(--success-bg);
      color: var(--success);
      border-color: var(--success-border);
    }

    .kakao-banner a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .kakao-banner a:hover {
      text-decoration: underline;
    }

    .report-list-item__title a {
      color: var(--text-primary);
      text-decoration: none;
    }

    .report-list-item__title a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .section-header {
      padding: 1rem 1.25rem;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .section-header--tavily {
      background: var(--tavily-light);
    }

    .section-header--tavily h2 {
      color: var(--tavily);
    }

    .section-header--naver {
      background: var(--naver-light);
    }

    .section-header--naver h2 {
      color: var(--naver);
    }

    .section-header--report {
      background: var(--report-light);
    }

    .section-header--report h2 {
      color: var(--report-accent);
    }

    .section-header--analyze {
      background: #1a2a24;
    }

    .section-header--analyze h2 {
      color: #3fb950;
    }

    .file-analyze-panel {
      padding: 1.25rem;
    }

    .file-analyze-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .file-analyze-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.625rem;
      align-items: center;
    }

    .file-analyze-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 4.5rem;
    }

    .file-analyze-input {
      display: none;
    }

    .file-analyze-pick {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 0.875rem;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--surface-raised, #1c2129);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .file-analyze-pick:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .file-analyze-name {
      font-size: 0.8125rem;
      color: var(--text-muted);
      word-break: break-all;
    }

    .file-analyze-options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .file-analyze-option {
      position: relative;
    }

    .file-analyze-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .file-analyze-option span {
      display: inline-block;
      padding: 0.4375rem 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--surface-raised, #1c2129);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .file-analyze-option input:checked + span {
      color: #3fb950;
      background: #132519;
      border-color: #238636;
    }

    .file-analyze-option small {
      display: block;
      margin-top: 0.25rem;
      font-size: 0.6875rem;
      color: var(--text-muted);
      padding-left: 0.25rem;
    }

    .file-analyze-submit {
      align-self: flex-start;
      padding: 0.625rem 1.125rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      color: #0d1117;
      background: #3fb950;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }

    .file-analyze-submit:hover:not(:disabled) {
      background: #56d364;
    }

    .file-analyze-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .file-analyze-status {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .file-analyze-status--error {
      color: var(--error);
    }

    .file-analyze-result {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .file-analyze-result__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .file-analyze-result__badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      background: #132519;
      color: #3fb950;
      font-weight: 600;
    }

    .file-analyze-result__body {
      padding: 1rem 1.125rem;
      background: var(--accent-light);
      border-radius: var(--radius);
      font-size: 0.9375rem;
      color: var(--text-primary);
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .report-panel {
      padding: 1.5rem 1.25rem;
    }

    .report-panel__title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .report-panel__label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
    }

    .report-panel__summary {
      padding: 1rem;
      background: var(--accent-light);
      border-radius: var(--radius);
      font-size: 0.9375rem;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
      white-space: pre-wrap;
    }

    .report-panel__body {
      font-size: 0.9375rem;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      white-space: pre-wrap;
      line-height: 1.75;
    }

    .report-panel__sources {
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .report-panel__sources-content {
      font-size: 0.875rem;
      color: var(--text-secondary);
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .report-panel__model {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .section-meta {
      margin-top: 0.25rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .report-list {
      list-style: none;
      min-height: 120px;
    }

    .report-list-item {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .report-list-item:last-child {
      border-bottom: none;
    }

    .report-list-item--new {
      background: var(--highlight);
    }

    .report-list-item__topic {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.375rem;
    }

    .report-list-item__title {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: var(--text-primary);
    }

    .report-list-item__summary {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.375rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .report-list-item__meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .result-list {
      list-style: none;
    }

    .result-item {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-item__title {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
    }

    .result-item__title a {
      color: var(--text-primary);
      text-decoration: none;
    }

    .result-item__title a:hover {
      text-decoration: underline;
      color: var(--accent);
    }

    .result-item__body {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-item__meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3.5rem 1.5rem;
      text-align: center;
    }

    .empty-state-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .empty-state p {
      font-size: 0.9375rem;
      color: var(--text-muted);
    }

    .error-box {
      padding: 1rem 1.25rem;
      font-size: 0.875rem;
      color: var(--error);
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: var(--radius);
    }

    .loading-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2.5rem 1.5rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .loading-panel__spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-panel p {
      font-size: 0.9375rem;
      color: var(--text-muted);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #research-results[hidden] {
      display: none;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>방산 리서치 아카이브</h1>
      <p>방위산업 관련 리서치 보고서를 모아두는 아카이브입니다.</p>

      <form id="research-form" class="research-form">
        <input
          id="topic-input"
          type="text"
          name="keyword"
          placeholder="관심 주제 키워드 (예: KF-21, 방산 수출, 드론)"
          autocomplete="off"
          required
        />
        <button type="submit" id="research-btn">리서치 실행</button>
      </form>
      <p id="research-status" class="research-status" hidden></p>
      <div id="kakao-banner" class="kakao-banner" hidden></div>
    </header>

    <section aria-labelledby="file-analyze-heading">
      <div class="section-header section-header--analyze">
        <h2 id="file-analyze-heading">파일 분석</h2>
        <p class="section-meta">PDF · 이미지 · 음성 (최대 50MB, 3.5MB 이상은 Storage 경유)</p>
      </div>
      <div class="file-analyze-panel">
        <form id="file-analyze-form" class="file-analyze-form">
          <div class="file-analyze-row">
            <span class="file-analyze-label">파일</span>
            <label class="file-analyze-pick" for="file-analyze-input">파일 선택</label>
            <input
              id="file-analyze-input"
              class="file-analyze-input"
              type="file"
              accept=".pdf,.jpg,.jpeg,.png,.webp,.gif,.heic,.heif,.wav,.mp3,.aiff,.aac,.ogg,.flac,application/pdf,image/*,audio/*"
            />
            <span id="file-analyze-name" class="file-analyze-name">선택된 파일 없음</span>
          </div>

          <div class="file-analyze-row">
            <span class="file-analyze-label">분석 방식</span>
            <div class="file-analyze-options" role="radiogroup" aria-label="분석 방식">
              <label class="file-analyze-option">
                <input type="radio" name="analyze-mode" value="summary" checked />
                <span>핵심 요약</span>
              </label>
              <label class="file-analyze-option">
                <input type="radio" name="analyze-mode" value="checklist" />
                <span>체크리스트 추출</span>
              </label>
              <label class="file-analyze-option">
                <input type="radio" name="analyze-mode" value="transcript" />
                <span>전체 받아쓰기</span>
                <small>음성 파일에 적합</small>
              </label>
            </div>
          </div>

          <button type="submit" id="file-analyze-btn" class="file-analyze-submit" disabled>분석 요청</button>
          <p id="file-analyze-status" class="file-analyze-status" hidden></p>
        </form>

        <div id="file-analyze-result" class="file-analyze-result" hidden></div>
      </div>
    </section>

    <div id="research-results" hidden>
      <section aria-labelledby="tavily-results-heading">
        <div class="section-header section-header--tavily">
          <h2 id="tavily-results-heading">글로벌 검색 (Tavily)</h2>
          <p class="section-meta" id="tavily-meta"></p>
        </div>
        <ul class="result-list" id="tavily-results"></ul>
      </section>

      <section aria-labelledby="naver-results-heading">
        <div class="section-header section-header--naver">
          <h2 id="naver-results-heading">국내 검색 (Naver)</h2>
          <p class="section-meta" id="naver-meta"></p>
        </div>
        <ul class="result-list" id="naver-results"></ul>
      </section>

      <section aria-labelledby="report-heading">
        <div class="section-header section-header--report">
          <h2 id="report-heading">AI 리서치 보고서</h2>
          <p class="section-meta" id="report-meta"></p>
        </div>
        <div class="report-panel" id="report-panel">
          <p class="empty-state" style="padding:2rem 0">리서치를 실행하면 보고서가 여기에 표시됩니다.</p>
        </div>
      </section>
    </div>

    <section aria-labelledby="report-list-heading">
      <div class="section-header">
        <h2 id="report-list-heading">보고서 목록</h2>
      </div>

      <ul class="report-list" id="report-list">
        <li class="empty-state">
          <svg class="empty-state-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
          <p>등록된 보고서가 없습니다.</p>
        </li>
      </ul>
    </section>

    <footer>
      방산 리서치 아카이브
    </footer>
  </div>

  <script>
    const form = document.getElementById("research-form");
    const topicInput = document.getElementById("topic-input");
    const researchBtn = document.getElementById("research-btn");
    const statusEl = document.getElementById("research-status");
    const resultsWrap = document.getElementById("research-results");
    const tavilyList = document.getElementById("tavily-results");
    const naverList = document.getElementById("naver-results");
    const tavilyMeta = document.getElementById("tavily-meta");
    const naverMeta = document.getElementById("naver-meta");
    const reportPanel = document.getElementById("report-panel");
    const reportMeta = document.getElementById("report-meta");
    const reportListEl = document.getElementById("report-list");
    const kakaoBanner = document.getElementById("kakao-banner");
    const fileAnalyzeForm = document.getElementById("file-analyze-form");
    const fileAnalyzeInput = document.getElementById("file-analyze-input");
    const fileAnalyzeName = document.getElementById("file-analyze-name");
    const fileAnalyzeBtn = document.getElementById("file-analyze-btn");
    const fileAnalyzeStatus = document.getElementById("file-analyze-status");
    const fileAnalyzeResult = document.getElementById("file-analyze-result");

    const ANALYSIS_PROMPTS = {
      summary:
        "첨부된 파일의 핵심 내용을 한국어로 요약해 주세요. 중요한 사실·수치·결론을 bullet point 5~8개로 정리하고, 마지막에 한 줄 핵심 결론을 덧붙여 주세요.",
      checklist:
        "첨부된 파일에서 실행 가능한 항목, 요건, 할 일, 주의사항을 한국어 체크리스트 형식으로 추출해 주세요. 각 항목 앞에 [ ]를 붙이고, 카테고리별로 묶어 주세요.",
      transcript:
        "첨부된 파일의 내용을 한국어로 전사(받아쓰기)해 주세요. 음성이면 말한 내용을 빠짐없이 문단으로 정리하고 화자 구분이 가능하면 구분해 주세요. 문서·이미지면 보이는 텍스트를 있는 그대로 정리해 주세요.",
    };

    const ANALYSIS_LABELS = {
      summary: "핵심 요약",
      checklist: "체크리스트 추출",
      transcript: "전체 받아쓰기",
    };

    let highlightReportId = null;
    let kakaoLoginUrl = "/api/kakao/oauth/login";

    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function setStatus(message, type) {
      statusEl.hidden = !message;
      statusEl.textContent = message || "";
      statusEl.className = "research-status" + (type ? ` research-status--${type}` : "");
    }

    function setLoading(loading, label) {
      researchBtn.disabled = loading;
      topicInput.disabled = loading;
      researchBtn.textContent = loading ? (label || "처리 중…") : "리서치 실행";
    }

    function renderLoadingPanel(message) {
      return `
        <div class="loading-panel">
          <div class="loading-panel__spinner" aria-hidden="true"></div>
          <p>${escapeHtml(message)}</p>
        </div>`;
    }

    function renderSearchLoading() {
      const html = `<li class="loading-panel"><div class="loading-panel__spinner" aria-hidden="true"></div><p>검색 중…</p></li>`;
      tavilyList.innerHTML = html;
      naverList.innerHTML = html;
      tavilyMeta.textContent = "";
      naverMeta.textContent = "";
    }

    function renderReportLoading() {
      reportMeta.textContent = "작성 중";
      reportPanel.innerHTML = renderLoadingPanel("Gemini가 검색 결과를 바탕으로 보고서를 작성하고 있습니다…");
    }

    function renderKakaoBanner(configured, message) {
      kakaoBanner.hidden = false;
      kakaoBanner.className = `kakao-banner${configured ? " kakao-banner--ok" : ""}`;
      if (configured) {
        kakaoBanner.textContent = message || "카카오톡 연동됨 — 보고서 완성 시 나에게 보내기로 전송됩니다.";
        return;
      }
      kakaoBanner.innerHTML = `${escapeHtml(message || "카카오톡 연동이 필요합니다.")} <a href="${escapeHtml(kakaoLoginUrl)}">카카오 로그인</a>`;
    }

    async function loadKakaoStatus() {
      try {
        const res = await fetch("/api/kakao/status");
        const data = await res.json().catch(() => ({}));
        if (data.loginUrl) kakaoLoginUrl = data.loginUrl;
        renderKakaoBanner(Boolean(data.configured));
      } catch {
        kakaoBanner.hidden = true;
      }
    }

    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleString("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      });
    }

    function renderReportList(reports) {
      if (!reports?.length) {
        reportListEl.innerHTML = `
          <li class="empty-state">
            <svg class="empty-state-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
            </svg>
            <p>등록된 보고서가 없습니다.</p>
          </li>`;
        return;
      }

      reportListEl.innerHTML = reports.map((item) => {
        const isNew = highlightReportId != null && item.id === highlightReportId;
        return `
          <li class="report-list-item${isNew ? " report-list-item--new" : ""}" data-id="${item.id}">
            <span class="report-list-item__topic">${escapeHtml(item.topic || "주제 없음")}</span>
            <div class="report-list-item__title">
              <a href="/report.html?id=${item.id}">${escapeHtml(item.title || "제목 없음")}</a>
            </div>
            <div class="report-list-item__summary">${escapeHtml(item.summary || "")}</div>
            <div class="report-list-item__meta">${formatDate(item.created_at)} · ${escapeHtml(item.source_type || "search")}</div>
          </li>`;
      }).join("");
    }

    async function loadReportList(highlightId) {
      if (highlightId != null) highlightReportId = highlightId;

      try {
        const res = await fetch("/api/reports");
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "목록을 불러오지 못했습니다.");
        renderReportList(data.reports || []);
      } catch (err) {
        reportListEl.innerHTML = `<li class="error-box">${escapeHtml(err.message)}</li>`;
      }
    }

    function renderReport(report) {
      if (!report?.ok) {
        reportPanel.innerHTML = `<div class="error-box">${escapeHtml(report?.error || "보고서 생성 실패")}</div>`;
        reportMeta.textContent = "";
        return;
      }

      reportMeta.textContent = report.model ? `모델: ${report.model}` : "";

      reportPanel.innerHTML = `
        <div class="report-panel__title">${escapeHtml(report.title || "제목 없음")}</div>

        <div class="report-panel__label">요약</div>
        <div class="report-panel__summary">${escapeHtml(report.summary || "요약 없음")}</div>

        <div class="report-panel__label">본문</div>
        <div class="report-panel__body">${escapeHtml(report.body || "본문 없음")}</div>

        <div class="report-panel__sources">
          <div class="report-panel__label">참고 출처</div>
          <div class="report-panel__sources-content">${escapeHtml(report.sources || "출처 없음")}</div>
        </div>
      `;
    }

    function renderError(container, message) {
      container.innerHTML = `<li class="error-box">${escapeHtml(message)}</li>`;
    }

    function renderEmpty(container, message) {
      container.innerHTML = `<li class="empty-state"><p>${escapeHtml(message)}</p></li>`;
    }

    function renderTavilyResults(data) {
      if (!data.ok) {
        renderError(tavilyList, data.error || "Tavily 검색 실패");
        tavilyMeta.textContent = "";
        return;
      }

      const results = data.results || [];
      tavilyMeta.textContent = `"${escapeHtml(data.query || "")}" · 관련도순 ${results.length}건`;

      if (!results.length) {
        renderEmpty(tavilyList, "검색 결과가 없습니다.");
        return;
      }

      tavilyList.innerHTML = results.map((item) => `
        <li class="result-item">
          <div class="result-item__title">
            <a href="${escapeHtml(item.url || "#")}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(item.title || "제목 없음")}
            </a>
          </div>
          <div class="result-item__body">${escapeHtml(item.content || "")}</div>
          <div class="result-item__meta">
            ${item.published_date ? `날짜: ${escapeHtml(item.published_date)} · ` : ""}
            ${item.url ? escapeHtml(item.url) : ""}
            ${item.score != null ? ` · score: ${item.score}` : ""}
          </div>
        </li>
      `).join("");
    }

    function renderNaverResults(data) {
      if (!data.ok) {
        renderError(naverList, data.error || "Naver 검색 실패");
        naverMeta.textContent = "";
        return;
      }

      const items = data.items || [];
      naverMeta.textContent = `관련도순 · 총 ${data.total ?? items.length}건 중 ${items.length}건 표시`;

      if (!items.length) {
        renderEmpty(naverList, "검색 결과가 없습니다.");
        return;
      }

      naverList.innerHTML = items.map((item) => `
        <li class="result-item">
          <div class="result-item__title">
            <a href="${escapeHtml(item.originallink || item.link || "#")}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(item.title || "제목 없음")}
            </a>
          </div>
          <div class="result-item__body">${escapeHtml(item.description || "")}</div>
          <div class="result-item__meta">
            ${item.pubDate ? `날짜: ${escapeHtml(item.pubDate)} · ` : ""}
            ${item.originallink ? escapeHtml(item.originallink) : escapeHtml(item.link || "")}
          </div>
        </li>
      `).join("");
    }

    async function fetchSearch(keyword) {
      const res = await fetch("/api/research/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `검색 실패 (${res.status})`);
      return data;
    }

    async function fetchReport(keyword, tavily, naver) {
      const res = await fetch("/api/research/report", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword, tavily, naver }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `보고서 생성 실패 (${res.status})`);
      return data;
    }

    function buildStatusMessage(summary, report) {
      const tCount = summary?.tavilyCount ?? 0;
      const nCount = summary?.naverCount ?? 0;
      const reportOk = report?.ok;
      const saved = report?.saved;
      const kakaoSent = report?.kakaoSent;

      if (reportOk && saved && kakaoSent) {
        return { msg: `완료 — 글로벌 ${tCount}건, 국내 ${nCount}건 · 저장 및 카카오톡 전송됨`, type: "ok" };
      }
      if (reportOk && saved) {
        const type = report?.kakaoError ? "error" : "ok";
        return {
          msg: `완료 — 보고서 저장됨 · 카카오: ${report?.kakaoError || "전송 실패"}`,
          type,
          kakaoError: report?.kakaoError,
          kakaoLoginUrl: report?.kakaoLoginUrl,
        };
      }
      if (reportOk) {
        return {
          msg: `완료 — 글로벌 ${tCount}건, 국내 ${nCount}건 · 저장 실패: ${report?.saveError || ""}`,
          type: "error",
        };
      }
      return {
        msg: `검색 완료 (${tCount}/${nCount}건) · 보고서: ${report?.error || "생성 실패"}`,
        type: "error",
      };
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const keyword = topicInput.value.trim();
      if (!keyword) {
        setStatus("주제 키워드를 입력하세요.", "error");
        return;
      }

      setLoading(true, "검색 중…");
      setStatus("글로벌·국내 검색 중…", "");
      resultsWrap.hidden = false;
      renderSearchLoading();
      renderReportLoading();

      try {
        const searchData = await fetchSearch(keyword);
        renderTavilyResults(searchData.tavily);
        renderNaverResults(searchData.naver);

        const tCount = searchData.summary?.tavilyCount ?? 0;
        const nCount = searchData.summary?.naverCount ?? 0;
        setStatus(`검색 완료 — 글로벌 ${tCount}건, 국내 ${nCount}건 · AI 보고서 작성 중…`, "");
        setLoading(true, "보고서 작성 중…");
        renderReportLoading();

        try {
          const reportData = await fetchReport(keyword, searchData.tavily, searchData.naver);
          const report = reportData.report;
          renderReport(report);

          if (report?.saved && report?.savedId) {
            await loadReportList(report.savedId);
          }

          const status = buildStatusMessage(searchData.summary, report);
          setStatus(status.msg, status.type);
          if (status.kakaoLoginUrl) {
            kakaoLoginUrl = status.kakaoLoginUrl;
            renderKakaoBanner(false, status.kakaoError);
          }
        } catch (reportErr) {
          setStatus(reportErr.message, "error");
          renderReport({ ok: false, error: reportErr.message });
        }
      } catch (searchErr) {
        setStatus(searchErr.message, "error");
        renderError(tavilyList, searchErr.message);
        renderError(naverList, searchErr.message);
        renderReport({ ok: false, error: searchErr.message });
      } finally {
        setLoading(false);
      }
    });

    loadReportList();
    loadKakaoStatus();

    function setFileAnalyzeStatus(message, isError) {
      fileAnalyzeStatus.hidden = !message;
      fileAnalyzeStatus.textContent = message || "";
      fileAnalyzeStatus.className = "file-analyze-status" + (isError ? " file-analyze-status--error" : "");
    }

    function formatFileSize(bytes) {
      if (!bytes) return "";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function getSelectedAnalyzeMode() {
      const checked = fileAnalyzeForm.querySelector('input[name="analyze-mode"]:checked');
      return checked?.value || "summary";
    }

    function renderFileAnalyzeResult(data, mode) {
      fileAnalyzeResult.hidden = false;
      fileAnalyzeResult.innerHTML = `
        <div class="file-analyze-result__meta">
          <span class="file-analyze-result__badge">${escapeHtml(ANALYSIS_LABELS[mode] || mode)}</span>
          <span>${escapeHtml(data.fileName || "파일")}</span>
          <span>${escapeHtml(data.mimeType || "")}</span>
          ${data.model ? `<span>모델: ${escapeHtml(data.model)}</span>` : ""}
        </div>
        <div class="file-analyze-result__body">${escapeHtml(data.analysis || "결과 없음")}</div>
      `;
    }

    fileAnalyzeInput.addEventListener("change", () => {
      const file = fileAnalyzeInput.files?.[0];
      if (!file) {
        fileAnalyzeName.textContent = "선택된 파일 없음";
        fileAnalyzeBtn.disabled = true;
        return;
      }
      fileAnalyzeName.textContent = `${file.name} (${formatFileSize(file.size)})`;
      fileAnalyzeBtn.disabled = false;
    });

    async function fetchJson(url, options = {}) {
      let res;
      try {
        res = await fetch(url, options);
      } catch (err) {
        throw new Error(
          err?.message === "Failed to fetch"
            ? "네트워크 오류 — 연결을 확인하거나 잠시 후 다시 시도해 주세요."
            : err?.message || "요청 실패"
        );
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `요청 실패 (${res.status})`);
      return data;
    }

    const VERCEL_SAFE_BYTES = 3.5 * 1024 * 1024;

    async function uploadToSignedUrl(signedUrl, token, file) {
      const url = new URL(signedUrl);
      if (token && !url.searchParams.get("token")) {
        url.searchParams.set("token", token);
      }

      const body = new FormData();
      body.append("cacheControl", "3600");
      body.append("", file);

      let res;
      try {
        res = await fetch(url.toString(), {
          method: "PUT",
          headers: { "x-upsert": "false" },
          body,
        });
      } catch (err) {
        throw new Error(
          err?.message === "Failed to fetch"
            ? "Storage 업로드 네트워크 오류 — 연결을 확인해 주세요."
            : err?.message || "Storage upload failed"
        );
      }

      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(text || `Storage upload failed (${res.status})`);
      }
    }

    async function analyzeUploadedFile(file, prompt) {
      if (file.size <= VERCEL_SAFE_BYTES) {
        setFileAnalyzeStatus("AI가 파일을 분석하고 있습니다…", false);
        const formData = new FormData();
        formData.append("file", file);
        formData.append("prompt", prompt);
        return fetchJson("/api/analyze-file", { method: "POST", body: formData });
      }

      setFileAnalyzeStatus("업로드 준비 중…", false);
      const prep = await fetchJson("/api/analyze-file/prepare", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          fileName: file.name,
          size: file.size,
          mimeType: file.type,
        }),
      });

      setFileAnalyzeStatus("파일 업로드 중…", false);
      await uploadToSignedUrl(prep.signedUrl, prep.token, file);

      setFileAnalyzeStatus("AI가 파일을 분석하고 있습니다…", false);
      return fetchJson("/api/analyze-file/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          storagePath: prep.storagePath,
          fileName: file.name,
          mimeType: file.type,
          prompt,
        }),
      });
    }

    fileAnalyzeForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const file = fileAnalyzeInput.files?.[0];
      if (!file) {
        setFileAnalyzeStatus("파일을 선택해 주세요.", true);
        return;
      }

      const mode = getSelectedAnalyzeMode();
      const prompt = ANALYSIS_PROMPTS[mode];

      fileAnalyzeBtn.disabled = true;
      fileAnalyzeInput.disabled = true;
      fileAnalyzeBtn.textContent = "분석 중…";
      fileAnalyzeResult.innerHTML = renderLoadingPanel("AI가 파일을 분석하고 있습니다…");
      fileAnalyzeResult.hidden = false;

      try {
        const data = await analyzeUploadedFile(file, prompt);
        renderFileAnalyzeResult(data, mode);
        setFileAnalyzeStatus("분석이 완료되었습니다.", false);
      } catch (err) {
        fileAnalyzeResult.hidden = false;
        fileAnalyzeResult.innerHTML = `<div class="error-box">${escapeHtml(err.message)}</div>`;
        setFileAnalyzeStatus(err.message, true);
      } finally {
        fileAnalyzeBtn.disabled = false;
        fileAnalyzeInput.disabled = false;
        fileAnalyzeBtn.textContent = "분석 요청";
      }
    });
  </script>
</body>
</html>
